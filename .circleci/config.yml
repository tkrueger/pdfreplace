version: 2
jobs:
  build:
    working_directory: ~/pdfreplace
    docker:
      - image: circleci/clojure:lein-2.9.1
        auth:
          username: thork
          password: $DOCKERHUB_PASSWORD
    environment:
      LEIN_ROOT: nbd
      JVM_OPTS: -Xmx3200m
    steps:
      - checkout
      - restore_cache:
          keys:
            - pdfreplace-{{ checksum "project.clj" }}
            - pdfreplace-
      - run: lein deps
      - save_cache:
          paths:
            - ~/.m2
          key: pdfreplace-{{ checksum "project.clj" }}
      - run: lein do test, uberjar
      - store_artifacts:
          path: target/uberjar/pdfreplace.jar
          destination: uberjar
